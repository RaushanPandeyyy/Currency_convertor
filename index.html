<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Currency Converter</title>

    <style>

        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans:wght@700&family=Poppins:wght@400;500;600&display=swap');

        *{
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body{
            background-color: white;
        }

        /* Navbar */

        .navbar{
            display: flex;
            align-items: center;
            background-color: #C4DAD2;
            padding: 22px;
            font-family: 'Noto Sans', sans-serif;
        }

        .brand-name{
            font-size: 24px;
            font-weight: bold;
            margin-right: 30px;
        }

        .navbar ul{
            display: flex;
        }

        .navbar ul li{
            list-style: none;
            margin: 0 18px;
        }

        .navbar ul li a{
            text-decoration: none;
            color: rgb(5, 5, 20);
            transition: color 0.4s ease;
        }

        .navbar ul li a:hover{
            color: #16423C;
        }

        /* Main Content */

        .main-section{
            width: 80vw;
            margin: auto;
            min-height: 100vh;
            font-family: 'Poppins', sans-serif;
        }

        .main-section h1,
        .main-section h2{
            margin: 22px 0;
        }

        .currency-form{
            display: flex;
            flex-direction: column;
        }

        .currency-form label{
            font-size: 24px;
        }

        .currency-form input,
        .currency-form select{
            width: 24vw;
            margin-bottom: 20px;
            font-size: 22px;
            padding: 4px;
        }

        .submit-btn{
            width: 140px;
            padding: 7px 10px;
            font-size: 18px;
            border: none;
            border-radius: 10px;
            background-color: #C4DAD2;
            cursor: pointer;
        }

        /* Output */

        .result-area{
            display: none;
        }

        .result-area table{
            width: 50vw;
            border-collapse: collapse;
            text-align: center;
            font-size: 20px;
            border: 2px solid black;
        }

        .result-area table th{
            padding: 5px;
        }

        /* Footer */

        footer{
            text-align: center;
            font-family: 'Poppins', sans-serif;
            padding: 10px;
        }

        /* Responsive */

        @media(max-width: 600px){

            .navbar{
                flex-direction: column;
                font-size: 15px;
            }

            .navbar ul{
                justify-content: center;
            }

            .navbar ul li{
                margin: 6px 12px;
            }

            .main-section{
                width: 95vw;
            }

            .currency-form input,
            .currency-form select{
                width: 80vw;
            }
        }

    </style>

</head>
<body>

    <nav class="navbar">

        <div class="brand-name">
            MyCurrencyConverter
        </div>

        <ul>
            <li><a href="/">Home</a></li>
            <li><a href="/about">About</a></li>
            <li><a href="/contact">Contact</a></li>
        </ul>

    </nav>

    <div class="main-section">

        <h1>Select Currency to Convert</h1>

        <form class="currency-form">

            <label for="amount">Enter Amount:</label>

            <input type="number" id="amount" min="1" max="10">

            <label for="currencyType">Select Currency:</label>

            <select id="currencyType">

                <option value="INR">Indian Rupee</option>
                <option value="USD">US Dollar</option>
                <option value="EUR">Euro</option>

            </select>

            <button type="submit" class="submit-btn">
                Convert
            </button>

        </form>

        <div class="result-area">

            <h2>Converted Currency Values</h2>

            <table>

                <thead>
                    <tr>
                        <th>Currency</th>
                        <th>Code</th>
                        <th>Converted Value</th>
                    </tr>
                </thead>

                <tbody>

                </tbody>

            </table>

        </div>

    </div>

    <footer>
        Copyright &copy; All Rights Reserved
    </footer>

    <script src="main.js"></script>

</body>
</html>
